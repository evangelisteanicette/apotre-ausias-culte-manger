<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,user-scalable=no">
<title>APÔTRE AUSIAS CULT MANAGER</title>
<meta name="theme-color" content="#4A90D9">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-title" content="Cult Manager">
<meta name="description" content="Application de gestion intelligente des cultes — APÔTRE AUSIAS">

<!-- ═══════════════════════════════════════════════════
     DÉPENDANCES EXTERNES (CDN)
     Aucune installation requise – fonctionne directement
     ═══════════════════════════════════════════════════ -->
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>

<style>
/* ══════════════════════════════════
   VARIABLES & RESET
   ══════════════════════════════════ */
:root{
  --P:#4A90D9;--PD:#2C6FAC;--PL:#D6E9FF;
  --S:#9B7FD4;--SD:#7A5FBA;
  --A:#F5E64A;--AD:#D4C520;
  --BG:#F8FAFF;--W:#fff;
  --GL:#E8EEF7;--G:#8A9BB5;
  --DK:#1E2D54;--DKL:#2C3E6B;
  --RED:#E74C3C;--GRN:#27AE60;--YLW:#F39C12;
  --SH:0 4px 24px rgba(74,144,217,.18);
  --SHS:0 2px 10px rgba(0,0,0,.07);
  --R:16px;--RS:10px;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%;overflow:hidden}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:var(--BG);color:var(--DK);font-size:15px;line-height:1.5}
button{font-family:inherit;cursor:pointer}
input,select,textarea{font-family:inherit}
a{color:inherit;text-decoration:none}
::-webkit-scrollbar{width:3px}
::-webkit-scrollbar-thumb{background:var(--GL);border-radius:2px}

/* ══════════════════════════════════
   SPLASH
   ══════════════════════════════════ */
#splash{
  position:fixed;inset:0;z-index:9999;
  background:linear-gradient(145deg,var(--P) 0%,var(--S) 60%,var(--SD) 100%);
  display:flex;align-items:center;justify-content:center;flex-direction:column;
}
.spl-wrap{text-align:center;color:#fff}
.spl-icon{font-size:76px;animation:sway 3s ease-in-out infinite;display:block;margin-bottom:20px}
.spl-title{font-size:22px;font-weight:800;letter-spacing:1.5px;margin-bottom:4px}
.spl-sub{font-size:13px;opacity:.75;letter-spacing:3px;text-transform:uppercase}
.spl-spin{width:38px;height:38px;border:3px solid rgba(255,255,255,.25);border-top-color:#fff;border-radius:50%;animation:spin .7s linear infinite;margin:28px auto 0}
@keyframes spin{to{transform:rotate(360deg)}}
@keyframes sway{0%,100%{transform:rotate(-4deg)}50%{transform:rotate(4deg)}}

/* ══════════════════════════════════
   AUTH
   ══════════════════════════════════ */
#auth{
  position:fixed;inset:0;z-index:100;display:none;
  background:linear-gradient(160deg,#EDF4FF 0%,#F0EAFF 100%);
  align-items:center;justify-content:center;padding:16px;overflow-y:auto;
}
.auth-box{
  width:100%;max-width:420px;background:var(--W);border-radius:24px;
  padding:32px 24px 28px;box-shadow:var(--SH);
}
.auth-logo{text-align:center;margin-bottom:24px}
.auth-logo-icon{font-size:58px;display:block;margin-bottom:10px}
.auth-logo h1{font-size:17px;font-weight:800;color:var(--P);line-height:1.3}
.auth-logo p{font-size:12px;color:var(--G);margin-top:4px;letter-spacing:.5px}
.auth-tabs{display:flex;background:var(--GL);border-radius:10px;padding:4px;margin-bottom:22px;gap:4px}
.atab{flex:1;padding:9px;border:none;background:none;font-size:13px;font-weight:600;color:var(--G);border-radius:8px;transition:all .2s}
.atab.on{background:var(--W);color:var(--P);box-shadow:var(--SHS)}
.aform{display:flex;flex-direction:column;gap:11px}
.ainp{width:100%;padding:12px 14px;border:1.5px solid var(--GL);border-radius:var(--RS);font-size:14px;outline:none;transition:border-color .2s;background:var(--BG)}
.ainp:focus{border-color:var(--P);background:#fff}
.auth-ver{text-align:center;margin-top:18px;font-size:11px;color:var(--G);letter-spacing:.3px}

/* ══════════════════════════════════
   MAIN APP SHELL
   ══════════════════════════════════ */
#app{
  display:none;flex-direction:column;height:100vh;overflow:hidden;
}

/* TOP BAR */
.topbar{
  display:flex;align-items:center;gap:10px;
  padding:0 14px;height:54px;flex-shrink:0;
  background:linear-gradient(120deg,var(--P),var(--S));
  box-shadow:0 2px 12px rgba(74,144,217,.35);
  position:relative;z-index:50;
}
#btn-back{
  width:34px;height:34px;border-radius:50%;border:none;
  background:rgba(255,255,255,.2);color:#fff;font-size:22px;
  display:none;align-items:center;justify-content:center;line-height:1;flex-shrink:0
}
.topbar-title{flex:1;font-size:17px;font-weight:700;color:#fff;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.topbar-right{display:flex;align-items:center;gap:8px}
.role-pill{font-size:11px;background:rgba(255,255,255,.2);color:#fff;padding:4px 10px;border-radius:20px;font-weight:600;white-space:nowrap}
#btn-logout{width:32px;height:32px;border:none;border-radius:50%;background:rgba(255,255,255,.15);color:#fff;font-size:15px;display:flex;align-items:center;justify-content:center}

/* CONTENT */
#content{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch}
.view{padding:14px;max-width:640px;margin:0 auto;padding-bottom:16px}

/* BOTTOM NAV */
#bnav{
  display:flex;border-top:1px solid var(--GL);background:var(--W);
  flex-shrink:0;box-shadow:0 -3px 12px rgba(0,0,0,.06);
}
.nb{
  flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;
  gap:2px;padding:8px 4px;border:none;background:none;color:var(--G);font-size:10px;font-weight:500;
  transition:color .2s;
}
.nb .ni{font-size:21px;line-height:1;transition:transform .2s}
.nb.on{color:var(--P)}
.nb.on .ni{transform:scale(1.15)}

/* ══════════════════════════════════
   SHARED COMPONENTS
   ══════════════════════════════════ */

/* Buttons */
.btn{
  display:inline-flex;align-items:center;justify-content:center;gap:6px;
  border:none;border-radius:10px;font-size:14px;font-weight:600;
  cursor:pointer;transition:all .18s;
}
.btn-p{background:linear-gradient(120deg,var(--P),var(--PD));color:#fff;padding:12px 20px;width:100%}
.btn-p:active{transform:scale(.98)}
.btn-s{background:var(--GL);color:var(--DK);padding:12px 20px;width:100%}
.btn-s:active{opacity:.8}
.btn-sm{padding:8px 14px!important;font-size:13px!important;width:auto!important}
.btn-xs{padding:6px 12px!important;font-size:12px!important;width:auto!important}
.btn-icon{width:34px;height:34px;border:none;border-radius:8px;background:var(--GL);color:var(--DK);font-size:16px;display:flex;align-items:center;justify-content:center;transition:all .2s}
.btn-icon:hover{background:var(--PL);color:var(--P)}
.btn-del{background:#FFE8E6;color:var(--RED)}
.btn-del:hover{background:var(--RED);color:#fff}
.btn-wa{background:#25D366;color:#fff;padding:12px 20px;width:100%}
.btn-tg{background:#0088CC;color:#fff;padding:12px 20px;width:100%}
.btn-ml{background:var(--S);color:#fff;padding:12px 20px;width:100%}
.btn-full{width:100%;justify-content:center}
.btn-link{background:none;border:none;color:var(--P);font-size:13px;text-align:center;padding:4px;cursor:pointer}

/* Cards */
.card{background:var(--W);border-radius:var(--R);box-shadow:var(--SHS);padding:16px;margin-bottom:12px}
.card-h{display:flex;justify-content:space-between;align-items:center;margin-bottom:12px}
.card-acts{display:flex;gap:6px}

/* Form */
.fg{margin-bottom:14px}
.fg label{display:block;font-size:12px;font-weight:700;color:var(--DKL);margin-bottom:5px;text-transform:uppercase;letter-spacing:.4px}
.fg input,.fg select,.fg textarea{
  width:100%;padding:11px 13px;border:1.5px solid var(--GL);border-radius:var(--RS);
  font-size:14px;outline:none;transition:border-color .2s;background:var(--BG);color:var(--DK);
}
.fg input:focus,.fg select:focus,.fg textarea:focus{border-color:var(--P);background:#fff}

/* Badges */
.badge{display:inline-flex;align-items:center;padding:3px 10px;border-radius:20px;font-size:11px;font-weight:700}
.b-g{background:#E6F9F0;color:#1E8A4C}
.b-y{background:#FFF6E0;color:#C47A00}
.b-r{background:#FFE6E4;color:#C0392B}
.b-p{background:#EEE7FF;color:var(--S)}
.b-b{background:var(--PL);color:var(--PD)}

/* Section label */
.sec-lbl{font-size:13px;font-weight:800;color:var(--DKL);margin:18px 0 10px;text-transform:uppercase;letter-spacing:.8px;display:flex;align-items:center;gap:8px}
.sec-lbl::after{content:'';flex:1;height:1px;background:var(--GL)}

/* States */
.loading{text-align:center;padding:48px 16px;color:var(--G);font-size:15px}
.empty{text-align:center;padding:40px 16px;background:var(--W);border-radius:var(--R);box-shadow:var(--SHS)}
.empty-ic{font-size:52px;margin-bottom:10px}
.empty p{font-size:13px;color:var(--G);margin-bottom:14px}
.err-box{background:#FFE6E4;color:var(--RED);border-radius:var(--R);padding:16px;text-align:center;font-size:14px}

/* View header */
.view-hd{display:flex;justify-content:space-between;align-items:center;margin-bottom:16px}
.view-hd h2{font-size:20px;font-weight:800}

/* ══════════════════════════════════
   DASHBOARD
   ══════════════════════════════════ */
.dash-greeting{margin-bottom:18px}
.dash-greeting h2{font-size:24px;font-weight:800;line-height:1.2}
.dash-greeting p{font-size:13px;color:var(--G);margin-top:2px}
.stats-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:18px}
@media(min-width:480px){.stats-grid{grid-template-columns:repeat(4,1fr)}}
.stat-card{
  background:var(--W);border-radius:var(--R);padding:14px;text-align:center;
  box-shadow:var(--SHS);cursor:pointer;transition:all .2s;
}
.stat-card:active{transform:scale(.97)}
.stat-ic{font-size:26px;margin-bottom:6px}
.stat-v{font-size:26px;font-weight:800;color:var(--P);line-height:1}
.stat-l{font-size:11px;color:var(--G);margin-top:3px;font-weight:600}

.next-card{
  border-radius:var(--R);padding:20px;margin-bottom:18px;
  background:linear-gradient(135deg,var(--P),var(--S));color:#fff;
  cursor:pointer;transition:all .2s;box-shadow:0 6px 20px rgba(74,144,217,.4);
}
.next-card:active{transform:scale(.98)}
.next-eye{font-size:11px;opacity:.75;letter-spacing:1px;text-transform:uppercase;margin-bottom:4px}
.next-card h3{font-size:21px;font-weight:800;margin:4px 0 10px}
.next-card .m{font-size:13px;opacity:.88;margin:3px 0;display:flex;align-items:center;gap:5px}
.nc-acts{display:flex;gap:8px;margin-top:14px;flex-wrap:wrap}

.q-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-bottom:4px}
.q-btn{
  background:var(--W);border:none;border-radius:var(--RS);padding:14px 6px;
  text-align:center;font-size:10px;font-weight:600;color:var(--DKL);
  box-shadow:var(--SHS);cursor:pointer;transition:all .2s;line-height:1.4;
}
.q-btn .qi{font-size:24px;display:block;margin-bottom:5px}
.q-btn:active{background:var(--PL);color:var(--P)}

/* ══════════════════════════════════
   CULTE CARDS
   ══════════════════════════════════ */
.culte-card{
  background:var(--W);border-radius:var(--R);padding:14px 16px;
  display:flex;align-items:center;gap:12px;margin-bottom:10px;
  cursor:pointer;box-shadow:var(--SHS);transition:all .2s;
}
.culte-card:active{transform:scale(.98)}
.culte-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0}
.culte-info{flex:1;min-width:0}
.ci-theme{font-size:15px;font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.ci-meta{font-size:12px;color:var(--G);margin-top:3px}
.ci-acts{display:flex;flex-direction:column;align-items:flex-end;gap:6px;flex-shrink:0}

/* ══════════════════════════════════
   CULTE DETAIL
   ══════════════════════════════════ */
.cd-header{
  border-radius:var(--R);padding:20px;margin-bottom:14px;
  background:linear-gradient(135deg,var(--P),var(--S));color:#fff;
  box-shadow:0 6px 20px rgba(74,144,217,.35);
}
.cd-eye{font-size:11px;opacity:.7;letter-spacing:1.5px;text-transform:uppercase;margin-bottom:6px}
.cd-header h2{font-size:22px;font-weight:800;margin:4px 0 10px}
.cd-meta{display:flex;flex-direction:column;gap:4px;font-size:13px;opacity:.9}
.cd-meta span{display:flex;align-items:center;gap:5px}
.cd-acts{display:flex;gap:8px;margin-top:14px;flex-wrap:wrap}

/* Tabs */
.tabs{display:flex;gap:4px;background:var(--GL);border-radius:var(--RS);padding:4px;margin-bottom:14px}
.tab{
  flex:1;padding:9px;border:none;background:none;
  font-size:13px;font-weight:600;color:var(--G);border-radius:8px;transition:all .2s;cursor:pointer;
}
.tab.on{background:var(--W);color:var(--P);box-shadow:var(--SHS)}

/* ══════════════════════════════════
   TASK CARDS + TIMER
   ══════════════════════════════════ */
.task-card{
  background:var(--W);border-radius:var(--R);padding:15px;margin-bottom:12px;
  box-shadow:var(--SHS);border-left:4px solid var(--GL);transition:border-color .3s;
}
.task-card.tc-running{border-left-color:var(--GRN)}
.task-card.tc-pause{border-left-color:var(--YLW)}
.task-card.tc-done{border-left-color:var(--P)}
.tc-head{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:10px}
.tc-name{font-size:15px;font-weight:700}
.tc-meta{font-size:11px;color:var(--G);margin-top:3px;display:flex;flex-wrap:wrap;gap:8px}
.tc-status{font-size:11px;font-weight:700;padding:3px 8px;border-radius:20px;white-space:nowrap}
.ts-wait{background:var(--GL);color:var(--G)}
.ts-run{background:#E6F9F0;color:var(--GRN)}
.ts-pause{background:#FFF6E0;color:var(--YLW)}
.ts-done{background:var(--PL);color:var(--PD)}

/* Timer Display */
.timer-wrap{
  background:var(--BG);border-radius:12px;padding:14px;margin:10px 0;text-align:center;
}
.timer-time{
  font-size:42px;font-weight:800;font-variant-numeric:tabular-nums;
  letter-spacing:2px;line-height:1;transition:color .4s;
}
.timer-bar-track{height:6px;background:var(--GL);border-radius:3px;margin:10px 0 6px;overflow:hidden}
.timer-bar-fill{height:100%;border-radius:3px;transition:width .8s linear,background .4s}
.timer-sub{font-size:11px;color:var(--G)}

/* Timer Controls */
.tc-ctrl{display:flex;gap:5px;flex-wrap:wrap;margin-top:6px}
.tc-btn{
  flex:1;min-width:52px;padding:9px 6px;border:none;border-radius:8px;
  font-size:12px;font-weight:700;cursor:pointer;transition:all .18s;
}
.tc-btn:disabled{opacity:.35;cursor:not-allowed}
.tcb-start{background:#E6F9F0;color:var(--GRN)}
.tcb-start:not(:disabled):active{background:var(--GRN);color:#fff}
.tcb-pause{background:#FFF6E0;color:var(--YLW)}
.tcb-pause:not(:disabled):active{background:var(--YLW);color:#fff}
.tcb-stop{background:#FFE6E4;color:var(--RED)}
.tcb-stop:not(:disabled):active{background:var(--RED);color:#fff}
.tcb-reset{background:var(--GL);color:var(--G)}
.tcb-reset:active{background:var(--G);color:#fff}
.tcb-del{background:#FFE6E4;color:var(--RED);min-width:34px;max-width:34px;font-size:14px}
.tc-foot{font-size:11px;color:var(--G);margin-top:8px;padding-top:8px;border-top:1px solid var(--GL)}

/* ══════════════════════════════════
   PRESENCE
   ══════════════════════════════════ */
.pres-stats{display:flex;gap:8px;margin-bottom:14px;flex-wrap:wrap}
.pres-item{
  background:var(--W);border-radius:var(--RS);padding:12px 14px;
  display:flex;justify-content:space-between;align-items:center;
  margin-bottom:8px;box-shadow:var(--SHS);
}
.pres-left{display:flex;align-items:center;gap:10px}
.ava{
  width:42px;height:42px;border-radius:50%;flex-shrink:0;
  background:linear-gradient(135deg,var(--P),var(--S));
  color:#fff;font-size:18px;font-weight:800;
  display:flex;align-items:center;justify-content:center;
}
.ava-sm{width:34px;height:34px;font-size:15px}
.pres-name{font-size:14px;font-weight:600}
.pres-role{font-size:11px;color:var(--G)}
.pres-btns{display:flex;gap:5px}
.pb{
  width:34px;height:34px;border:2px solid var(--GL);border-radius:50%;
  background:none;font-size:15px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .18s;
}
.pb-gon{background:#E6F9F0;border-color:var(--GRN)}
.pb-yon{background:#FFF6E0;border-color:var(--YLW)}
.pb-ron{background:#FFE6E4;border-color:var(--RED)}
.pres-label{font-size:13px;font-weight:700}

/* ══════════════════════════════════
   SECTIONS & MEMBRES
   ══════════════════════════════════ */
.sec-card,.mb-card{
  background:var(--W);border-radius:var(--R);padding:14px 16px;
  display:flex;align-items:center;gap:12px;margin-bottom:10px;
  box-shadow:var(--SHS);
}
.sec-info,.mb-info{flex:1;min-width:0}
.sec-name,.mb-name{font-size:15px;font-weight:700}
.sec-sub,.mb-sub{font-size:12px;color:var(--G);margin-top:3px}
.mb-badges{display:flex;gap:5px;margin-top:6px;flex-wrap:wrap}

/* ══════════════════════════════════
   RAPPORTS
   ══════════════════════════════════ */
.rpt-box{background:var(--W);border-radius:var(--R);padding:16px;box-shadow:var(--SHS);margin-bottom:14px}
.rpt-sec{font-size:13px;line-height:1.7;border-bottom:1px solid var(--GL);padding-bottom:12px;margin-bottom:12px}
.rpt-row{display:flex;gap:8px;justify-content:space-between;font-size:12px;padding:6px 0;border-bottom:1px dashed var(--GL);flex-wrap:wrap}
.rpt-btns{display:flex;flex-direction:column;gap:8px;margin-top:16px}

/* ══════════════════════════════════
   MODAL (BOTTOM SHEET)
   ══════════════════════════════════ */
#modal-ov{
  position:fixed;inset:0;z-index:200;
  background:rgba(30,45,84,.55);backdrop-filter:blur(5px);
  display:none;align-items:flex-end;justify-content:center;
}
.modal{
  background:var(--W);border-radius:20px 20px 0 0;
  width:100%;max-width:520px;max-height:88vh;
  overflow-y:auto;animation:slideUp .28s ease;
}
@keyframes slideUp{from{transform:translateY(100%)}to{transform:translateY(0)}}
.modal-hd{
  display:flex;justify-content:space-between;align-items:center;
  padding:16px 20px;border-bottom:1px solid var(--GL);
  position:sticky;top:0;background:var(--W);z-index:1;
}
.modal-hd h3{font-size:17px;font-weight:800}
.modal-close{width:30px;height:30px;border:none;background:var(--GL);border-radius:50%;font-size:18px;color:var(--G);display:flex;align-items:center;justify-content:center;cursor:pointer}
.modal-body{padding:16px 20px}
.modal-foot{display:flex;gap:10px;padding:12px 20px 28px}

/* ══════════════════════════════════
   INSTALL BANNER
   ══════════════════════════════════ */
#install-banner{
  display:none;position:fixed;bottom:74px;left:12px;right:12px;z-index:190;
}
.ib-inner{
  background:var(--DK);color:#fff;border-radius:14px;
  padding:12px 14px;display:flex;align-items:center;gap:10px;
  box-shadow:0 6px 24px rgba(0,0,0,.3);
}
.ib-inner span{flex:1;font-size:13px;font-weight:500}
.ib-inner button{border:none;border-radius:8px;padding:7px 14px;font-size:12px;font-weight:700;cursor:pointer}
.ib-go{background:var(--A);color:var(--DK)}
.ib-x{background:none;color:rgba(255,255,255,.5);font-size:19px;padding:4px 6px!important}

/* ══════════════════════════════════
   TOAST
   ══════════════════════════════════ */
#toast{
  position:fixed;bottom:80px;left:50%;transform:translateX(-50%) translateY(16px);
  background:var(--DK);color:#fff;padding:10px 20px;border-radius:25px;
  font-size:14px;font-weight:500;z-index:9000;
  opacity:0;transition:all .28s;pointer-events:none;white-space:nowrap;max-width:calc(100vw - 32px);
}
#toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
#toast.ok{background:var(--GRN)}
#toast.err{background:var(--RED)}
#toast.inf{background:var(--P)}

@media(min-width:600px){
  #modal-ov{align-items:center}
  .modal{border-radius:20px;max-height:82vh}
}
</style>
</head>
<body>

     ════════════════════════════════════════ -->
<div id="splash">
  <div class="spl-wrap">
    <span class="spl-icon">⛪</span>
    <div class="spl-title">APÔTRE AUSIAS</div>
    <div class="spl-sub">Cult Manager</div>
    <div class="spl-spin"></div>

</div>

<!-- ════════════════════════════════════════
     AUTH
     ════════════════════════════════════════ -->
<div id="auth">
  <div class="auth-box">
    <div class="auth-logo">
      <span class="auth-logo-icon">⛪</span>
      <h1>APÔTRE AUSIAS<br>CULT MANAGER</h1>

      <button class="btn btn-p" onclick="doRegister()">Créer mon compte →</button>

    <p class="auth-ver">v2.0 — APÔTRE AUSIAS CULT MANAGER</p>

</div>

<!-- ════════════════════════════════════════
     MAIN APP
     ════════════════════════════════════════ -->
<div id="app">
  <div class="topbar">
    <button id="btn-back" onclick="goBack()">‹</button>
    <div class="topbar-title" id="page-title">Tableau de bord</div>
    <div class="topbar-right">
      <span class="role-pill" id="role-pill"></span>
      <button id="btn-logout" onclick="doLogout()" title="Déconnexion">⏻</button>

    <button class="nb" data-v="presences" onclick="nav('presences')">
      <span class="ni">✅</span>Présences
    </button>
    <button class="nb admin-btn" data-v="sections" onclick="nav('sections')">
      <span class="ni">🏛️</span>Sections
    </button>
    <button class="nb admin-btn" data-v="membres" onclick="nav('membres')">
      <span class="ni">👥</span>Membres

     MODAL

<!-- ════════════════════════════════════════
     JAVASCRIPT
     ════════════════════════════════════════ -->
<script>
/* ╔══════════════════════════════════════════════════════╗
   ║           CONFIGURATION SIMPLE                      ║
   ║  Modifiez uniquement cette section pour personnaliser║
   ╚══════════════════════════════════════════════════════╝ */

const CFG = {
  // ── Nom de l'application ──────────────────────────────
  appName: "APÔTRE AUSIAS CULT MANAGER",
  shortName: "Cult Manager",

  // ── Firebase (ne pas modifier si vous utilisez ce projet)
  firebase: {
    apiKey: "AIzaSyC5nOtQxuspx7DyO7zP1_MW26Wfmc0BUAE",
    authDomain: "apotreausiascultemanager.firebaseapp.com",
    projectId: "apotreausiascultemanager",
    storageBucket: "apotreausiascultemanager.appspot.com",
    messagingSenderId: "159183535630",
    appId: "1:159183535630:web:206476d53974a78a82465f"
  },

  // ── Email du 1er administrateur général ───────────────
  // Cet email recevra automatiquement le rôle admin_general
  adminEmail: "apotre.ausias@gmail.com",

  // ── Numéro WhatsApp par défaut pour les rapports ──────
  whatsappDefault: "+22900000000",
};

/* ╔══════════════════════════════════════════════════════╗
   ║           FIN CONFIGURATION                         ║
   ╚══════════════════════════════════════════════════════╝ */

// ── Firebase Init ─────────────────────────────────────
firebase.initializeApp(CFG.firebase);
const auth = firebase.auth();
const db   = firebase.firestore();
db.enablePersistence({synchronizeTabs:true}).catch(()=>{});

// ── App State ─────────────────────────────────────────
const S = {
  user: null, uDoc: null,
  view: 'dashboard',
  culteId: null, culte: null,
  tab: 'taches',
  listeners: [],      // all Firestore unsubs
  tabUnsub: null,     // current tab unsub
  timers: {},         // { taskId: intervalId }
  deferredPrompt: null,
  rapData: null,
  navHistory: [],
};

// ── Système de Permissions ────────────────────────────
/*
  RÔLES :
  👑 admin_general      → tout contrôler, tous les cultes, tous les paramètres
  ⛪ responsable_culte  → gérer TOUS les cultes (tâches, chrono, présences) - PAS les paramètres globaux
  🔧 admin_section      → ajouter des tâches UNIQUEMENT pour SA section - PAS le chrono
  👤 membre             → lecture seule (voir le dashboard et les chronos)
*/
function perms(culte){
  const role=S.uDoc?.role||'membre';
  const isGA  = role==='admin_general';
  const isRC  = role==='responsable_culte';   // ← peut gérer tous les cultes
  const isAS  = role==='admin_section';
  return {
    canChrono      : isGA||isRC,           // START/PAUSE/STOP/RESET
    canAddTask     : isGA||isRC||isAS,     // ajouter des tâches
    canDeleteTask  : isGA||isRC,           // supprimer des tâches
    canEditCulte   : isGA||isRC,           // modifier infos culte
    canGlobal      : isGA,                 // sections & membres uniquement
    isGA, isRC, isAS,
    userSection    : S.uDoc?.section||'',  // section de l'utilisateur courant
  };
}

// ── Utilities ─────────────────────────────────────────
const $  = id => document.getElementById(id);
const el = (tag, cls, html) => { const e=document.createElement(tag); if(cls)e.className=cls; if(html)e.innerHTML=html; return e; };

function toast(msg, type=''){
  const t=$('toast');
  t.textContent=msg;
  t.className='show '+(type==='ok'?'ok':type==='err'?'err':'inf');
  clearTimeout(t._t);
  t._t=setTimeout(()=>t.className='',3200);
}

function fDate(d){
  if(!d)return '—';
  const dt=d.toDate?d.toDate():new Date(d);
  if(isNaN(dt))return '—';
  return dt.toLocaleDateString('fr-FR',{weekday:'short',day:'numeric',month:'short',year:'numeric'});
}

function fTime(s){
  s=Math.max(0,Math.floor(s));
  const h=Math.floor(s/3600),m=Math.floor((s%3600)/60),sec=s%60;
  return h>0
    ?`${String(h).padStart(2,'0')}:${String(m).padStart(2,'0')}:${String(sec).padStart(2,'0')}`
    :`${String(m).padStart(2,'0')}:${String(sec).padStart(2,'0')}`;
}

function timerColor(elapsed, totalSec){
  if(!totalSec)return 'var(--P)';
  const p=elapsed/totalSec;
  if(p<.8)return 'var(--GRN)';
  if(p<=1)return 'var(--YLW)';
  return 'var(--RED)';
}

function clearAll(){
  S.listeners.forEach(u=>{try{u()}catch(e){}});
  S.listeners=[];
  if(S.tabUnsub){try{S.tabUnsub()}catch(e){}S.tabUnsub=null;}
  Object.values(S.timers).forEach(id=>clearInterval(id));
  S.timers={};
}

// ── Modal ─────────────────────────────────────────────
function openModal(html){
  $('modal-inner').innerHTML=html;
  $('modal-ov').style.display='flex';
  setTimeout(()=>$('modal-inner').querySelector('input,select')?.focus(),200);
}
function closeModal(){$('modal-ov').style.display='none'}

// ── Navigation ────────────────────────────────────────
function nav(view, push=true){
  clearAll();
  if(push && view!==S.view){ S.navHistory.push(S.view); }
  S.view=view;

  // Highlight nav button
  document.querySelectorAll('.nb').forEach(b=>{
    b.classList.toggle('on',b.dataset.v===view);
  });

  // Back button
  $('btn-back').style.display = S.navHistory.length>0 ? 'flex':'none';

  // Bottom nav visibility
  $('bnav').style.display = view==='culte-detail' ? 'none':'flex';

  const views={
    dashboard: renderDashboard,
    cultes: renderCultes,
    'culte-detail': ()=>renderCulteDetail(S.culteId),
    sections: renderSections,
    membres: renderMembres,
    presences: renderPresencesSelect,
    rapports: renderRapports,
  };
  if(views[view]) views[view]();
}

function goBack(){
  const prev=S.navHistory.pop()||'dashboard';
  nav(prev,false);
}

function openCulte(id){
  S.culteId=id; S.tab='taches';
  S.navHistory.push(S.view);
  nav('culte-detail',false);
}

// ── Auth ──────────────────────────────────────────────
function showSplash(v){$('splash').style.display=v?'flex':'none'}
function showAuth(v){$('auth').style.display=v?'flex':'none'}
function showApp(v){$('app').style.display=v?'flex':'none'}

function authTab(t){
  document.querySelectorAll('.atab').forEach((b,i)=>b.classList.toggle('on',(i===0&&t==='login')||(i===1&&t==='register')));
  $('af-login').style.display=t==='login'?'flex':'none';
  $('af-register').style.display=t==='register'?'flex':'none';
}

async function doLogin(){
  const e=$('l-email').value.trim(), p=$('l-pass').value;
  if(!e||!p){toast('Remplissez email et mot de passe','err');return;}
  showSplash(true);
  try{ await auth.signInWithEmailAndPassword(e,p); }
  catch(err){ showSplash(false); toast('Erreur: '+err.message,'err'); }
}

async function doRegister(){
  const nom=$('r-nom').value.trim(), e=$('r-email').value.trim();
  const p=$('r-pass').value, p2=$('r-pass2').value;
  if(!nom||!e||!p){toast('Tous les champs sont requis','err');return;}
  if(p!==p2){toast('Les mots de passe ne correspondent pas','err');return;}
  if(p.length<6){toast('Mot de passe trop court (min. 6)','err');return;}
  showSplash(true);
  try{
    const cred=await auth.createUserWithEmailAndPassword(e,p);
    const role=e.toLowerCase()===CFG.adminEmail.toLowerCase()?'admin_general':'membre';
    await db.collection('users').doc(cred.user.uid).set({
      nom,email:e,role,section:'',
      createdAt:firebase.firestore.FieldValue.serverTimestamp()
    });
  }catch(err){ showSplash(false); toast('Erreur: '+err.message,'err'); }
}

async function doForgot(){
  const e=$('l-email').value.trim();
  if(!e){toast('Entrez votre email','err');return;}
  try{ await auth.sendPasswordResetEmail(e); toast('Email de réinitialisation envoyé !','ok'); }
  catch(err){ toast(err.message,'err'); }
}

async function doLogout(){
  if(!confirm('Se déconnecter ?'))return;
  clearAll();
  await auth.signOut();
}

// ── Auth Observer ─────────────────────────────────────
auth.onAuthStateChanged(async user=>{
  if(user){
    S.user=user;
    try{
      let uSnap=await db.collection('users').doc(user.uid).get();
      if(!uSnap.exists){
        const role=user.email.toLowerCase()===CFG.adminEmail.toLowerCase()?'admin_general':'membre';
        await db.collection('users').doc(user.uid).set({
          nom:user.displayName||user.email.split('@')[0],
          email:user.email,role,section:'',
          createdAt:firebase.firestore.FieldValue.serverTimestamp()
        });
        uSnap=await db.collection('users').doc(user.uid).get();
      }
      S.uDoc=uSnap.data();
      bootApp();
    }catch(err){ showSplash(false); showAuth(true); toast('Erreur de chargement','err'); }
  } else {
    S.user=null; S.uDoc=null;
    showSplash(false); showApp(false); showAuth(true);
  }
});

function bootApp(){
  showSplash(false); showAuth(false); showApp(true);
  const role=S.uDoc?.role;
  const isGA=role==='admin_general';
  // Sections & Membres : Admin Général uniquement
  document.querySelectorAll('.admin-btn').forEach(b=>b.style.display=isGA?'flex':'none');
  const pills={
    admin_general   :'👑 Admin Gén.',
    responsable_culte:'⛪ Resp. Culte',
    admin_section   :'🔧 Admin Sec.',
    membre          :'👤 Membre'
  };
  $('role-pill').textContent=pills[role]||'👤';
  S.navHistory=[];
  nav('dashboard',false);
}

// ══════════════════════════════════════════════════════
// VIEWS
// ══════════════════════════════════════════════════════

// ── DASHBOARD ─────────────────────────────────────────
async function renderDashboard(){
  $('page-title').textContent='Tableau de bord';
  $('content').innerHTML='<div class="loading">⏳ Chargement...</div>';
  try{
    const [cSnap,sSnap,mSnap]=await Promise.all([
      db.collection('cultes').orderBy('date','desc').limit(30).get(),
      db.collection('sections').get(),
      db.collection('users').get(),
    ]);
    const cultes=cSnap.docs.map(d=>({id:d.id,...d.data()}));
    const now=new Date();
    const upcoming=cultes.find(c=>{
      const dt=c.date?.toDate?c.date.toDate():new Date(c.date||0);
      return dt>=now;
    });
    const nom=(S.uDoc?.nom||'').split(' ')[0]||'Ami';
    const role=S.uDoc?.role;
    const isGA=role==='admin_general';
    const isAdmin=['admin_general','admin_section'].includes(role);

    $('content').innerHTML=`<div class="view">
      <div class="dash-greeting">
        <h2>Bonjour, ${nom} 👋</h2>
        <p>Bienvenue dans votre espace de gestion</p>
      </div>
      <div class="stats-grid">
        <div class="stat-card" onclick="nav('cultes')"><div class="stat-ic">⛪</div><div class="stat-v">${cSnap.size}</div><div class="stat-l">Cultes</div></div>
        <div class="stat-card" onclick="nav('sections')"><div class="stat-ic">🏛️</div><div class="stat-v">${sSnap.size}</div><div class="stat-l">Sections</div></div>
        <div class="stat-card" onclick="nav('membres')"><div class="stat-ic">👥</div><div class="stat-v">${mSnap.size}</div><div class="stat-l">Membres</div></div>
        <div class="stat-card"><div class="stat-ic">📋</div><div class="stat-v">${cultes.length}</div><div class="stat-l">Total</div></div>
      </div>
      ${upcoming?`
        <div class="next-card" onclick="openCulte('${upcoming.id}')">
          <div class="next-eye">📅 PROCHAIN CULTE</div>
          <h3>${upcoming.theme||'Culte'}</h3>
          <div class="m">📍 ${upcoming.lieu||'Lieu non défini'}</div>
          <div class="m">📆 ${fDate(upcoming.date)}</div>
          <div class="m">👤 ${upcoming.responsable_general||'Non assigné'}</div>
          <div class="nc-acts">
            <span class="badge b-b">Ouvrir les tâches →</span>
          </div>
        </div>`:`
        <div class="empty" style="margin-bottom:18px">
          <div class="empty-ic">⛪</div>
          <p>Aucun culte à venir</p>
          ${isGA?`<button class="btn btn-p btn-sm" onclick="mCulte()">+ Créer un culte</button>`:''}
        </div>`}
      ${cultes.length>0?`
      <div class="sec-lbl">Cultes récents</div>
      ${cultes.slice(0,5).map(c=>culteRow(c)).join('')}`:''}
      ${isAdmin?`
      <div class="sec-lbl">Actions rapides</div>
      <div class="q-grid">
        ${isGA?`<button class="q-btn" onclick="mCulte()"><span class="qi">⛪</span>Culte</button>`:''}
        ${isGA?`<button class="q-btn" onclick="mSection()"><span class="qi">🏛️</span>Section</button>`:''}
        <button class="q-btn" onclick="nav('rapports')"><span class="qi">📊</span>Rapport</button>
        <button class="q-btn" onclick="nav('presences')"><span class="qi">✅</span>Présences</button>
      </div>`:''}
    </div>`;
  }catch(e){$('content').innerHTML=`<div class="view"><div class="err-box">❌ ${e.message}</div></div>`;}
}

function culteRow(c){
  const isGA=S.uDoc?.role==='admin_general';
  const dt=c.date?.toDate?c.date.toDate():new Date(c.date||0);
  const future=dt>=new Date();
  return `<div class="culte-card" onclick="openCulte('${c.id}')">
    <div class="culte-dot" style="background:${future?'var(--GRN)':'var(--G)'}"></div>
    <div class="culte-info">
      <div class="ci-theme">${c.theme||'Culte'}</div>
      <div class="ci-meta">📍 ${c.lieu||'—'} · 📆 ${fDate(c.date)}</div>
      <div class="ci-meta">👤 ${c.responsable_general||'—'}</div>
    </div>
    <div class="ci-acts">
      <span style="font-size:22px;color:var(--G)">›</span>
      ${isGA?`<button class="btn-icon btn-del" onclick="event.stopPropagation();delCulte('${c.id}')">🗑</button>`:''}
    </div>
  </div>`;
}

// ── CULTES ────────────────────────────────────────────
function renderCultes(){
  $('page-title').textContent='Cultes';
  const isGA=S.uDoc?.role==='admin_general';
  const unsub=db.collection('cultes').orderBy('date','desc').onSnapshot(snap=>{
    const cultes=snap.docs.map(d=>({id:d.id,...d.data()}));
    $('content').innerHTML=`<div class="view">
      <div class="view-hd">
        <h2>Liste des cultes</h2>
        ${isGA?`<button class="btn btn-p btn-sm" onclick="mCulte()">+ Créer</button>`:''}
      </div>
      ${cultes.length===0
        ?`<div class="empty"><div class="empty-ic">⛪</div><p>Aucun culte créé</p>${isGA?`<button class="btn btn-p btn-sm" onclick="mCulte()">+ Premier culte</button>`:''}</div>`
        :cultes.map(c=>culteRow(c)).join('')}
    </div>`;
  });
  S.listeners.push(unsub);
}

// ── CULTE DETAIL ──────────────────────────────────────
function renderCulteDetail(culteId){
  $('page-title').textContent='Détail du culte';
  $('btn-back').style.display='flex';
  $('bnav').style.display='none';
  $('content').innerHTML='<div class="loading">⏳ Chargement...</div>';
  if(!culteId)return;
  const unsub=db.collection('cultes').doc(culteId).onSnapshot(snap=>{
    if(!snap.exists){$('content').innerHTML='<div class="view"><div class="err-box">Culte introuvable</div></div>';return;}
    S.culte={id:snap.id,...snap.data()};
    renderCulteDetailUI(culteId,S.culte);
  });
  S.listeners.push(unsub);
}

function renderCulteDetailUI(culteId,c,_unused){
  const p=perms(c);
  const t=S.tab;
  $('content').innerHTML=`<div class="view">
    <div class="cd-header">
      <div class="cd-eye">⛪ CULTE</div>
      <h2>${c.theme||'Culte'}</h2>
      <div class="cd-meta">
        <span>📅 ${fDate(c.date)}</span>
        <span>📍 ${c.lieu||'Non défini'}</span>
        <span>👤 ${c.responsable_general||'Non assigné'}</span>
      </div>
      <div class="cd-acts">
        ${p.canEditCulte?`<button class="btn btn-s btn-xs" style="background:rgba(255,255,255,.2);color:#fff;border:none" onclick="mEditCulte('${culteId}')">✏️ Modifier</button>`:''}
        <button class="btn btn-s btn-xs" style="background:rgba(255,255,255,.2);color:#fff;border:none" onclick="nav('rapports')">📊 Rapport</button>
      </div>
    </div>
    <div class="tabs">
      <button class="tab ${t==='taches'?'on':''}" onclick="switchTab('taches')">⏱️ Tâches</button>
      <button class="tab ${t==='presence'?'on':''}" onclick="switchTab('presence')">✅ Présences</button>
    </div>
    <div id="tab-content"></div>
  </div>`;
  if(t==='taches') loadTaches(culteId,p);
  else loadPresence(culteId,p);
}

function switchTab(t){
  S.tab=t;
  if(S.tabUnsub){try{S.tabUnsub()}catch(e){}S.tabUnsub=null;}
  Object.values(S.timers).forEach(id=>clearInterval(id));
  S.timers={};
  document.querySelectorAll('.tab').forEach(b=>b.classList.toggle('on',b.textContent.includes(t==='taches'?'Tâches':'Présences')));
  const p=perms(S.culte);
  if(t==='taches') loadTaches(S.culteId,p);
  else loadPresence(S.culteId,p);
}

// ── TÂCHES ────────────────────────────────────────────
function loadTaches(culteId,p){
  const box=$('tab-content');
  if(!box)return;
  box.innerHTML='<div class="loading">⏳</div>';
  Object.values(S.timers).forEach(id=>clearInterval(id));
  S.timers={};

  const unsub=db.collection('tasks').where('culte_id','==',culteId).onSnapshot(snap=>{
    // Tri côté client (évite l'index composite Firestore)
    const allTasks=snap.docs.map(d=>({id:d.id,...d.data()}))
      .sort((a,b)=>(a.createdAt?.toMillis?.()||0)-(b.createdAt?.toMillis?.()||0));

    // Admin de section : ne voit QUE les tâches de sa section
    const tasks = p.isAS
      ? allTasks.filter(t=>!t.section || t.section===p.userSection)
      : allTasks;

    const tc=$('tab-content');
    if(!tc)return;
    Object.values(S.timers).forEach(id=>clearInterval(id));
    S.timers={};

    // Badge info section pour admin_section
    const sectionBanner = p.isAS
      ? `<div class="badge b-p" style="display:inline-flex;margin-bottom:12px;font-size:12px;padding:6px 12px">🏛️ Section : ${p.userSection||'Non assignée'} — Vous ne voyez que vos tâches</div>`
      : '';

    tc.innerHTML=`
      ${sectionBanner}
      ${p.canAddTask
        ? `<button class="btn btn-p btn-full" style="margin-bottom:12px;padding:14px" onclick="mTask('${culteId}')">➕ Ajouter une tâche</button>`
        : ''}
      ${tasks.length===0
        ?`<div class="empty"><div class="empty-ic">⏱️</div>
           <p>${p.isAS?'Aucune tâche pour votre section':'Aucune tâche pour ce culte'}</p>
           ${p.canAddTask?`<p style="font-size:12px;color:var(--G)">Cliquez sur le bouton ci-dessus</p>`:''}</div>`
        :tasks.map(t=>taskCardHTML(t,p)).join('')}
    `;
    tasks.forEach(t=>{
      if(t.statut==='en_cours'&&t.temps_debut){
        startLocalTimer(t.id,t.temps_debut,t.temps_pause||0,t.duree||10);
      }
    });
  },err=>{
    const tc=$('tab-content');
    if(tc) tc.innerHTML=`<div class="err-box">❌ Erreur : ${err.message}<br><br><button class="btn btn-p btn-sm" onclick="loadTaches('${culteId}',p)">🔄 Réessayer</button></div>`;
    toast('Erreur tâches : '+err.message,'err');
  });
  S.tabUnsub=unsub;
}

function taskCardHTML(t,p){
  const dur=(t.duree||10)*60;
  const elapsed=t.temps_pause||0;
  const color=timerColor(elapsed,dur);
  const pct=Math.min(100,(elapsed/dur)*100);
  const stMap={
    en_attente:['⏳ En attente','ts-wait'],
    en_cours  :['▶️ En cours','ts-run'],
    pause     :['⏸️ Pause','ts-pause'],
    terminé   :['✅ Terminé','ts-done']
  };
  const [stLabel,stCls]=stMap[t.statut]||['—','ts-wait'];
  const tcls=t.statut==='en_cours'?'tc-running':t.statut==='pause'?'tc-pause':t.statut==='terminé'?'tc-done':'';

  // L'admin de section peut supprimer uniquement SES tâches
  const canDelThis = p.canDeleteTask || (p.isAS && t.section===p.userSection);

  return `<div class="task-card ${tcls}" id="tc-${t.id}">
    <div class="tc-head">
      <div>
        <div class="tc-name">${t.nom_tache||'Tâche'}</div>
        <div class="tc-meta">
          <span>👤 ${t.responsable||'—'}</span>
          <span>🏛️ ${t.section||'—'}</span>
          <span>🕐 ${t.duree||'—'} min prévues</span>
        </div>
      </div>
      <div style="display:flex;flex-direction:column;align-items:flex-end;gap:5px">
        <span class="tc-status ${stCls}">${stLabel}</span>
        ${canDelThis?`<button class="btn-icon btn-del" style="width:28px;height:28px;font-size:13px" onclick="delTask('${t.id}')">🗑</button>`:''}
      </div>
    </div>

    <div class="timer-wrap">
      <div class="timer-time" id="tt-${t.id}" style="color:${color}">${fTime(elapsed)}</div>
      <div class="timer-bar-track"><div class="timer-bar-fill" id="tb-${t.id}" style="width:${pct}%;background:${color}"></div></div>
      <div class="timer-sub">${t.duree||'—'} min prévues · Temps écoulé affiché ci-dessus</div>
    </div>

    ${p.canChrono
      ? `<div class="tc-ctrl">
          <button class="tc-btn tcb-start" onclick="tStart('${t.id}',${t.duree||10})" ${t.statut==='en_cours'?'disabled':''}>▶ START</button>
          <button class="tc-btn tcb-pause" onclick="tPause('${t.id}')" ${t.statut!=='en_cours'?'disabled':''}>⏸ PAUSE</button>
          <button class="tc-btn tcb-stop"  onclick="tStop('${t.id}')">⏹ STOP</button>
          <button class="tc-btn tcb-reset" onclick="tReset('${t.id}')">↺ RESET</button>
        </div>`
      : `<div style="font-size:11px;color:var(--G);text-align:center;padding:6px 0">
           👁️ Lecture seule — seul l'Admin Général ou le Responsable de Culte peut contrôler le chrono
         </div>`
    }

    ${t.statut==='terminé'?`<div class="tc-foot">✅ Durée réelle : ${fTime(t.temps_pause||0)}</div>`:''}
  </div>`;
}

// ── LOCAL TIMER ───────────────────────────────────────
function startLocalTimer(taskId,tempsDebut,pauseSec,dureeMin){
  if(S.timers[taskId]) clearInterval(S.timers[taskId]);
  const startMs=tempsDebut?.toMillis?tempsDebut.toMillis():(tempsDebut?.seconds?tempsDebut.seconds*1000:Date.now());
  const durSec=dureeMin*60;
  const tick=()=>{
    const elapsed=Math.floor((Date.now()-startMs)/1000)+(pauseSec||0);
    const ttEl=document.getElementById('tt-'+taskId);
    const tbEl=document.getElementById('tb-'+taskId);
    if(!ttEl||!tbEl){clearInterval(S.timers[taskId]);delete S.timers[taskId];return;}
    const color=timerColor(elapsed,durSec);
    ttEl.textContent=fTime(elapsed);
    ttEl.style.color=color;
    tbEl.style.width=Math.min(100,(elapsed/durSec)*100)+'%';
    tbEl.style.background=color;
  };
  tick();
  S.timers[taskId]=setInterval(tick,1000);
}

// ── TIMER ACTIONS ─────────────────────────────────────
async function tStart(tid,duree){
  try{
    await db.collection('tasks').doc(tid).update({
      statut:'en_cours',
      temps_debut:firebase.firestore.FieldValue.serverTimestamp()
    });
    toast('Chronomètre démarré ▶','ok');
  }catch(e){toast(e.message,'err');}
}

async function tPause(tid){
  try{
    const doc=await db.collection('tasks').doc(tid).get();
    const d=doc.data();
    if(!d.temps_debut)return;
    const add=Math.floor((Date.now()-d.temps_debut.toMillis())/1000);
    await db.collection('tasks').doc(tid).update({
      statut:'pause',temps_pause:(d.temps_pause||0)+add,temps_debut:null
    });
    if(S.timers[tid]){clearInterval(S.timers[tid]);delete S.timers[tid];}
    toast('En pause ⏸','inf');
  }catch(e){toast(e.message,'err');}
}

async function tStop(tid){
  try{
    const doc=await db.collection('tasks').doc(tid).get();
    const d=doc.data();
    let total=d.temps_pause||0;
    if(d.temps_debut) total+=Math.floor((Date.now()-d.temps_debut.toMillis())/1000);
    await db.collection('tasks').doc(tid).update({
      statut:'terminé',temps_fin:firebase.firestore.FieldValue.serverTimestamp(),
      temps_pause:total,temps_debut:null
    });
    if(S.timers[tid]){clearInterval(S.timers[tid]);delete S.timers[tid];}
    toast('Tâche terminée ✅','ok');
  }catch(e){toast(e.message,'err');}
}

async function tReset(tid){
  if(!confirm('Réinitialiser ce chronomètre ?'))return;
  try{
    await db.collection('tasks').doc(tid).update({
      statut:'en_attente',temps_debut:null,temps_fin:null,temps_pause:0
    });
    if(S.timers[tid]){clearInterval(S.timers[tid]);delete S.timers[tid];}
    toast('Réinitialisé ↺','inf');
  }catch(e){toast(e.message,'err');}
}

async function delTask(tid){
  if(!confirm('Supprimer cette tâche ?'))return;
  try{
    if(S.timers[tid]){clearInterval(S.timers[tid]);delete S.timers[tid];}
    await db.collection('tasks').doc(tid).delete();
    toast('Tâche supprimée','inf');
  }catch(e){toast(e.message,'err');}
}

      await db.collection('presence').add({
        culte_id:culteId,membre_id:memId,membre:memNom,statut,
        updatedAt:firebase.firestore.FieldValue.serverTimestamp()
      });
    }
  }catch(e){toast(e.message,'err');}
}

// ── PDF ───────────────────────────────────────────────
async function genPDF(){
  if(!S.rapData){toast('Sélectionnez un culte','err');return;}
  const {culte,tasks,presences}=S.rapData;
  const {jsPDF}=window.jspdf;
  const doc=new jsPDF();
  const W=doc.internal.pageSize.getWidth();

  // Header band
  doc.setFillColor(74,144,217);
  doc.rect(0,0,W,32,'F');
  doc.setTextColor(255,255,255);
  doc.setFontSize(16);doc.setFont(undefined,'bold');
  doc.text('APÔTRE AUSIAS CULT MANAGER',W/2,13,{align:'center'});
  doc.setFontSize(10);doc.setFont(undefined,'normal');
  doc.text('RAPPORT DE CULTE',W/2,22,{align:'center'});
  doc.setTextColor(0,0,0);

  let y=44;
  const ln=(text,bold=false,size=10)=>{
    if(y>272){doc.addPage();y=18;}
    doc.setFontSize(size);doc.setFont(undefined,bold?'bold':'normal');
    doc.text(text,14,y);y+=6;
  };
  const section=(title)=>{
    y+=4;
    doc.setFillColor(235,243,255);doc.rect(12,y-5,W-24,8,'F');
    doc.setFontSize(11);doc.setFont(undefined,'bold');doc.setTextColor(44,111,172);
    doc.text(title,14,y);doc.setTextColor(0,0,0);y+=8;
  };

  section('INFORMATIONS DU CULTE');
  ln(`Thème : ${culte.theme||'—'}`);
  ln(`Date : ${fDate(culte.date)}`);
  ln(`Lieu : ${culte.lieu||'—'}`);
  ln(`Responsable : ${culte.responsable_general||'—'}`);

  y+=4;section(`TÂCHES (${tasks.length})`);
  if(tasks.length===0){ln('Aucune tâche enregistrée');}
  else{
    // table head
    doc.setFillColor(74,144,217);doc.rect(12,y-5,W-24,8,'F');
    doc.setTextColor(255,255,255);doc.setFontSize(9);doc.setFont(undefined,'bold');
    doc.text('Tâche',14,y);doc.text('Responsable',74,y);doc.text('Prévu',124,y);doc.text('Réel',148,y);doc.text('Statut',170,y);
    doc.setTextColor(0,0,0);y+=4;
    tasks.forEach((t,i)=>{
      if(y>272){doc.addPage();y=18;}
      if(i%2===0){doc.setFillColor(248,250,255);doc.rect(12,y-4,W-24,7,'F');}
      doc.setFontSize(9);doc.setFont(undefined,'normal');
      doc.text((t.nom_tache||'—').substring(0,22),14,y);
      doc.text((t.responsable||'—').substring(0,14),74,y);
      doc.text(`${t.duree||'—'}min`,124,y);
      doc.text(fTime(t.temps_pause||0),148,y);
      doc.text(t.statut||'—',170,y);
      y+=7;
    });
  }

  y+=4;section(`PRÉSENCES (${presences.length})`);
  const pr=presences.filter(p=>p.statut==='présent').length;
  const ab=presences.filter(p=>p.statut==='absent').length;
  const re=presences.filter(p=>p.statut==='retard').length;
  ln(`Présents: ${pr}  |  Absents: ${ab}  |  Retards: ${re}`);
  presences.forEach(p=>{
    if(y>272){doc.addPage();y=18;}
    doc.setFontSize(9);doc.text(`• ${p.membre||'?'} : ${p.statut||'—'}`,14,y);y+=6;
  });

  // Footer
  y=doc.internal.pageSize.getHeight()-10;
  doc.setFontSize(8);doc.setTextColor(150,150,150);
  doc.text(`Rapport généré le ${new Date().toLocaleDateString('fr-FR')} — APÔTRE AUSIAS CULT MANAGER`,W/2,y,{align:'center'});

  doc.save(`rapport-${(culte.theme||'culte').replace(/\s+/g,'-')}-${new Date().toLocaleDateString('fr-FR').replace(/\//g,'-')}.pdf`);
  toast('PDF téléchargé ! 📄','ok');
}

// ── DOCX ──────────────────────────────────────────────
async function genDOCX(){
  if(!S.rapData){toast('Sélectionnez un culte','err');return;}
  const {culte,tasks,presences}=S.rapData;
  const pr=presences.filter(p=>p.statut==='présent').length;
  const ab=presences.filter(p=>p.statut==='absent').length;
  const re=presences.filter(p=>p.statut==='retard').length;
  const esc=s=>String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  const p=(txt,bold=false,sz=22)=>`<w:p><w:r><w:rPr>${bold?'<w:b/>':''}<w:sz w:val="${sz}"/></w:rPr><w:t xml:space="preserve">${esc(txt)}</w:t></w:r></w:p>`;
  const ph=(txt,color='4A90D9')=>`<w:p><w:r><w:rPr><w:b/><w:sz w:val="26"/><w:color w:val="${color}"/></w:rPr><w:t>${esc(txt)}</w:t></w:r></w:p>`;
  const tr=(cells)=>`<w:tr>${cells.map(c=>`<w:tc><w:p><w:r><w:t xml:space="preserve">${esc(c)}</w:t></w:r></w:p></w:tc>`).join('')}</w:tr>`;
  const trH=(cells)=>`<w:tr>${cells.map(c=>`<w:tc><w:tcPr><w:shd w:val="clear" w:color="auto" w:fill="4A90D9"/></w:tcPr><w:p><w:r><w:rPr><w:b/><w:color w:val="FFFFFF"/></w:rPr><w:t>${esc(c)}</w:t></w:r></w:p></w:tc>`).join('')}</w:tr>`;

  const docXml=`<?xml version="1.0" encoding="UTF-8" standalone="yes"?>
<w:document xmlns:w="http://schemas.openxmlformats.org/wordprocessingml/2006/main" xmlns:r="http://schemas.openxmlformats.org/officeDocument/2006/relationships">
<w:body>
${p('APÔTRE AUSIAS CULT MANAGER',true,36)}
${p('RAPPORT DE CULTE',true,28)}
${p('')}
${ph('INFORMATIONS DU CULTE')}
${p('Thème : '+culte.theme,false,22)}
${p('Date : '+fDate(culte.date),false,22)}
${p('Lieu : '+culte.lieu,false,22)}
${p('Responsable : '+culte.responsable_general,false,22)}
${p('')}
${ph('TÂCHES ('+tasks.length+')')}
<w:tbl><w:tblPr><w:tblW w:w="9072" w:type="dxa"/><w:tblBorders><w:top w:val="single" w:sz="4" w:space="0" w:color="CCCCCC"/><w:left w:val="single" w:sz="4" w:space="0" w:color="CCCCCC"/><w:bottom w:val="single" w:sz="4" w:space="0" w:color="CCCCCC"/><w:right w:val="single" w:sz="4" w:space="0" w:color="CCCCCC"/><w:insideH w:val="single" w:sz="4" w:space="0" w:color="CCCCCC"/><w:insideV w:val="single" w:sz="4" w:space="0" w:color="CCCCCC"/></w:tblBorders></w:tblPr>
${trH(['Tâche','Responsable','Durée','Temps réel','Statut'])}
${tasks.map(t=>tr([t.nom_tache||'—',t.responsable||'—',`${t.duree||'—'}min`,fTime(t.temps_pause||0),t.statut||'—'])).join('')}
</w:tbl>
${p('')}
${ph('PRÉSENCES ('+presences.length+')')}
${p(`Présents: ${pr}  |  Absents: ${ab}  |  Retards: ${re}`,true)}
<w:tbl><w:tblPr><w:tblW w:w="9072" w:type="dxa"/></w:tblPr>
${trH(['Membre','Statut'])}
${presences.map(p=>tr([p.membre||'?',p.statut||'—'])).join('')}
</w:tbl>
${p('')}
${p('Rapport généré le '+new Date().toLocaleDateString('fr-FR')+' — APÔTRE AUSIAS CULT MANAGER',false,18)}
<w:sectPr/>
</w:body>
</w:document>`;

  const zip=new JSZip();
  zip.file('[Content_Types].xml',`<?xml version="1.0" encoding="UTF-8" standalone="yes"?><Types xmlns="http://schemas.openxmlformats.org/package/2006/content-types"><Default Extension="rels" ContentType="application/vnd.openxmlformats-package.relationships+xml"/><Default Extension="xml" ContentType="application/xml"/><Override PartName="/word/document.xml" ContentType="application/vnd.openxmlformats-officedocument.wordprocessingml.document.main+xml"/></Types>`);
  zip.folder('_rels').file('.rels',`<?xml version="1.0" encoding="UTF-8" standalone="yes"?><Relationships xmlns="http://schemas.openxmlformats.org/package/2006/relationships"><Relationship Id="rId1" Type="http://schemas.openxmlformats.org/officeDocument/2006/relationships/officeDocument" Target="word/document.xml"/></Relationships>`);
  zip.folder('word').file('document.xml',docXml);
  zip.folder('word').folder('_rels').file('document.xml.rels',`<?xml version="1.0" encoding="UTF-8" standalone="yes"?><Relationships xmlns="http://schemas.openxmlformats.org/package/2006/relationships"></Relationships>`);

  const blob=await zip.generateAsync({type:'blob',mimeType:'application/vnd.openxmlformats-officedocument.wordprocessingml.document'});
  const url=URL.createObjectURL(blob);
  const a=document.createElement('a');
  a.href=url;a.download=`rapport-${(culte.theme||'culte').replace(/\s+/g,'-')}.docx`;
  a.click();
  setTimeout(()=>URL.revokeObjectURL(url),2000);
  toast('DOCX téléchargé ! 📝','ok');
}

function shareTG(){

function shareML(){

// ── CULTE ─────────────────────────────────────────────
function mCulte(){
  openModal(`<div class="modal-hd"><h3>⛪ Nouveau Culte</h3><button class="modal-close" onclick="closeModal()">✕</button></div>
  <div class="modal-body">
    <div class="fg"><label>Thème *</label><input type="text" id="cc-theme" placeholder="Ex: La puissance de la résurrection"/></div>
    <div class="fg"><label>Date et heure *</label><input type="datetime-local" id="cc-date"/></div>
    <div class="fg"><label>Lieu</label><input type="text" id="cc-lieu" placeholder="Ex: Temple central, Cotonou"/></div>

  </div>
  <div class="modal-foot">
    <button class="btn btn-s" onclick="closeModal()">Annuler</button>
    <button class="btn btn-p" onclick="saveCulte()">✓ Créer le culte</button>
  </div>`);
}

async function saveCulte(){
  const theme=$('cc-theme')?.value.trim();
  const date=$('cc-date')?.value;
  const lieu=$('cc-lieu')?.value.trim();
  const resp=$('cc-resp')?.value.trim();
  if(!theme||!date){toast('Thème et date sont requis','err');return;}
  try{
    await db.collection('cultes').add({
      theme,lieu,responsable_general:resp,
      date:firebase.firestore.Timestamp.fromDate(new Date(date)),
      createdBy:S.user.uid,
      createdAt:firebase.firestore.FieldValue.serverTimestamp()
    });
    closeModal();toast('Culte créé ! ⛪','ok');
  }catch(e){toast(e.message,'err');}
}

function mEditCulte(id){
  db.collection('cultes').doc(id).get().then(doc=>{
    const c=doc.data();
    const dv=c.date?.toDate?c.date.toDate().toISOString().slice(0,16):'';
    openModal(`<div class="modal-hd"><h3>✏️ Modifier le Culte</h3><button class="modal-close" onclick="closeModal()">✕</button></div>
    <div class="modal-body">
      <div class="fg"><label>Thème</label><input type="text" id="ec-theme" value="${c.theme||''}"/></div>
      <div class="fg"><label>Date et heure</label><input type="datetime-local" id="ec-date" value="${dv}"/></div>
      <div class="fg"><label>Lieu</label><input type="text" id="ec-lieu" value="${c.lieu||''}"/></div>
      <div class="fg"><label>Responsable</label><input type="text" id="ec-resp" value="${c.responsable_general||''}"/></div>
    </div>
    <div class="modal-foot">
      <button class="btn btn-s" onclick="closeModal()">Annuler</button>
      <button class="btn btn-p" onclick="updCulte('${id}')">✓ Enregistrer</button>
    </div>`);
  });
}

async function updCulte(id){
  const theme=$('ec-theme')?.value.trim();
  const date=$('ec-date')?.value;
  const lieu=$('ec-lieu')?.value.trim();
  const resp=$('ec-resp')?.value.trim();
  try{
    const upd={theme,lieu,responsable_general:resp};
    if(date) upd.date=firebase.firestore.Timestamp.fromDate(new Date(date));
    await db.collection('cultes').doc(id).update(upd);
    closeModal();toast('Culte modifié ✅','ok');
  }catch(e){toast(e.message,'err');}

async function delCulte(id){
  if(!confirm('Supprimer ce culte et toutes ses données ?'))return;
  try{
    await db.collection('cultes').doc(id).delete();
    toast('Culte supprimé','inf');
    if(S.view==='culte-detail') goBack();
  }catch(e){toast(e.message,'err');}

// ── TASK ──────────────────────────────────────────────
async function mTask(culteId){
  const p=perms(S.culte);
  const sSnap=await db.collection('sections').get();
  const secs=sSnap.docs.map(d=>d.data().nom);

  // Admin de section : section pré-sélectionnée et verrouillée
  const secOptions = p.isAS
    ? `<option value="${p.userSection}" selected>${p.userSection}</option>`
    : `<option value="">-- Choisir --</option>${secs.map(s=>`<option value="${s}">${s}</option>`).join('')}`;

  openModal(`<div class="modal-hd"><h3>➕ Nouvelle Tâche</h3><button class="modal-close" onclick="closeModal()">✕</button></div>
  <div class="modal-body">
    <div class="fg"><label>Nom de la tâche *</label><input type="text" id="mt-nom" placeholder="Ex: Chant d'ouverture, Prédication..."/></div>
    <div class="fg"><label>Responsable</label><input type="text" id="mt-resp" placeholder="Nom du responsable de la tâche"/></div>
    <div class="fg"><label>Section ${p.isAS?'(votre section)':''}</label>
      <select id="mt-sec" ${p.isAS?'disabled':''}>
        ${secOptions}
      </select>
      ${p.isAS?`<input type="hidden" id="mt-sec-hidden" value="${p.userSection}"/>`:''}
    </div>
    <div class="fg"><label>Durée prévue (minutes) *</label><input type="number" id="mt-duree" placeholder="Ex: 15" min="1" max="999"/></div>
  </div>
  <div class="modal-foot">
    <button class="btn btn-s" onclick="closeModal()">Annuler</button>
    <button class="btn btn-p" onclick="saveTask('${culteId}')">✓ Ajouter</button>
  </div>`);
}

async function saveTask(culteId){
  const nom=$('mt-nom')?.value.trim();
  const duree=parseInt($('mt-duree')?.value)||0;
  const resp=$('mt-resp')?.value.trim();
  // Pour admin_section le select est disabled → lire le champ hidden
  const sec=$('mt-sec-hidden')?.value || $('mt-sec')?.value;
  if(!nom||!duree){toast('Nom et durée sont requis','err');return;}
  try{
    await db.collection('tasks').add({
      culte_id:culteId,nom_tache:nom,responsable:resp,section:sec,duree,
      statut:'en_attente',temps_debut:null,temps_fin:null,temps_pause:0,
      createdAt:firebase.firestore.FieldValue.serverTimestamp()
    });
    closeModal();toast('Tâche ajoutée ⏱️','ok');
  }catch(e){toast(e.message,'err');}
}

// ══════════════════════════════════════════════════════
// PWA — SERVICE WORKER & MANIFEST
// ══════════════════════════════════════════════════════
function initPWA(){
  // ── Manifest ──
  const manifest={
    name:CFG.appName,short_name:CFG.shortName,
    description:"Application de gestion intelligente des cultes",
    start_url:"./",scope:"./",display:"standalone",
    orientation:"portrait-primary",
    theme_color:"#4A90D9",background_color:"#F8FAFF",
    icons:[
      {src:"data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect width='100' height='100' rx='22' fill='%234A90D9'/><text y='78' x='10' font-size='75'>⛪</text></svg>",sizes:"192x192",type:"image/svg+xml"},
      {src:"data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect width='100' height='100' rx='22' fill='%234A90D9'/><text y='78' x='10' font-size='75'>⛪</text></svg>",sizes:"512x512",type:"image/svg+xml",purpose:"maskable any"}
    ]
  };
  const mb=new Blob([JSON.stringify(manifest)],{type:'application/manifest+json'});
  const ml=document.createElement('link');
  ml.rel='manifest';ml.href=URL.createObjectURL(mb);
  document.head.appendChild(ml);

  // ── Service Worker ──
  const SW=`
const CACHE='cult-manager-v2';
self.addEventListener('install',e=>{self.skipWaiting();});
self.addEventListener('activate',e=>{
  e.waitUntil(caches.keys().then(ks=>Promise.all(ks.filter(k=>k!==CACHE).map(k=>caches.delete(k)))).then(()=>clients.claim()));
});
self.addEventListener('fetch',e=>{
  if(e.request.method!=='GET')return;
  if(e.request.url.includes('firebase')||e.request.url.includes('googleapis')){
    e.respondWith(fetch(e.request).catch(()=>new Response('',{status:503})));
    return;
  }
  e.respondWith(
    caches.open(CACHE).then(cache=>
      fetch(e.request).then(res=>{cache.put(e.request,res.clone());return res;})
      .catch(()=>cache.match(e.request).then(r=>r||new Response('Hors ligne',{status:503,statusText:'Offline'})))
    )
  );
});`;

  if('serviceWorker' in navigator){
    const sb=new Blob([SW],{type:'application/javascript'});
    navigator.serviceWorker.register(URL.createObjectURL(sb))
      .catch(e=>console.log('SW:',e));
  }

  // ── Install Prompt ──
  window.addEventListener('beforeinstallprompt',e=>{
    e.preventDefault();
    S.deferredPrompt=e;
    $('install-banner').style.display='block';
  });
  window.addEventListener('appinstalled',()=>{
    $('install-banner').style.display='none';
    toast('Application installée ! 🎉','ok');
    S.deferredPrompt=null;
  });
}

async function installApp(){
  if(!S.deferredPrompt)return;
  S.deferredPrompt.prompt();
  const r=await S.deferredPrompt.userChoice;
  if(r.outcome==='accepted'){$('install-banner').style.display='none';S.deferredPrompt=null;}
}

// ── BOOT ──────────────────────────────────────────────
document.addEventListener('DOMContentLoaded',()=>{
  initPWA();
  // Auth state listener handles everything else
});
</script>
